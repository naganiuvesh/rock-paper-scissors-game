<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div>Rock Paper Scissor</div>
    </nav>
    <section class="main">
        <button><img class="rock" src="https://chauhan-hardik.github.io/Rock-Paper-Scissors/images/rock.png" alt="Rock"></button>
        <button><img class="paper" src="https://tse4.mm.bing.net/th/id/OIP.hZ19DgfkM-W7JY_9A1YFugHaEK?cb=thfvnextfalcon3&rs=1&pid=ImgDetMain&o=7&rm=3" alt="Paper"></button>
        <button><img class="scissor" src="https://tse3.mm.bing.net/th/id/OIP.dpwyIEpPJeU7qvokllhHBgHaEK?cb=thfvnextfalcon3&rs=1&pid=ImgDetMain&o=7&rm=3" alt="Scissor"></button>
    </section>
    <section class="point">
        <div class="you">
            <div class="you-point">0</div>
            <div class="you-text">You</div>
        </div>
        <div class="comp">
            <div class="comp-point">0</div>
            <div class="comp-text">Computer</div>
        </div>
    </section>
    <section class="result-section">
        <div class="result">Pick your move</div>
    </section>
    <script src="script.js"></script>
</body>
</html>
